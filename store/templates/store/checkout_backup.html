<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">ShoePlug</a>

        <a href="/cart/" class="btn btn-warning">
            Cart
        </a>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-4 text-center">
                        Checkout
                    </h2>

                    <form method="POST">
                        {% csrf_token %}

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="full_name"
                            class="form-control"
                            required>

                        <br>

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input
                            type="text"
                            name="phone_number"
                            class="form-control"
                            required>

                        <br>

                        <label class="form-label">
                            Delivery Address
                        </label>

                        <textarea
                            name="address"
                            class="form-control"
                            rows="4"
                            required></textarea>

                        <br>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            Place Order

                        </button>

                    </form>

                    <br>

                    <a href="/cart/"
                       class="btn btn-secondary w-100">
                        Back to Cart
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
