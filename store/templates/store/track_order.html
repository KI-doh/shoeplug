<!DOCTYPE html>
<html>
<head>
    <title>Track Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Track Your Order</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text"
                   name="phone_number"
                   class="form-control"
                   placeholder="Enter Phone Number"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Search Orders
        </button>

    </form>

    <hr>

    {% if orders %}

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>

            {% for order in orders %}

                <tr>
                    <td>{{ order.full_name }}</td>
                    <td>KSh {{ order.total_amount }}</td>
                    <td>{{ order.status }}</td>
                    <td>{{ order.created_at }}</td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    {% endif %}

</div>

</body>
</html>
